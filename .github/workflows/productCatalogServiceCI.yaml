#CI for product catalog service
name: product-catalog-ci
# This workflow runs on pull requests to the main branch.
on: 
    pull_request:
        branches:
        - main

#jobs define the steps to build, test, and deploy the product catalog service.
jobs:
    build:
        runs-on: ubuntu-latest   #The build job runs on the latest version of Ubuntu provided by GitHub Actions.
        steps:
        - name: checkout code #This step checks out the code from the repository so that it can be built and tested.
          uses: actions/checkout@v4 

        - name: Setup Go 1.22 #This step sets up the Go environment with version 1.22, which is required to build and test the product catalog service.
          uses: actions/setup-go@v2
          with:
            go-version: 1.22
        
        - name: Build #This step builds the product catalog service by navigating to the src/product-catalog directory, downloading the necessary Go modules, and compiling the main.go file into an executable named product-catalog-service.
          run: |
            cd src/product-catalog
            go mod download
            go build -o product-catalog-service main.go   
          #This command compiles the Go code and creates an executable file named product-catalog-service.

        - name: unit tests #This step runs the unit tests for the product catalog service by navigating to the src/product-catalog directory and executing the go test command, which runs all the tests in that directory and its subdirectories.
          run: |
            cd src/product-catalog
            go test ./...

    code-quality: #This job checks the code quality of the product catalog service using golangci-lint, a popular linter for Go code. It runs on the latest version of Ubuntu and depends on the build job to ensure that the code is built before checking for linting issues. 
        runs-on: ubuntu-latest
        steps:
        - name: checkout code
          uses: actions/checkout@v4

        - name: Run golangci-lint #This step uses the golangci-lint-action to run golangci-lint on the code in the src/product-catalog directory. It specifies the version of golangci-lint to use (v1.56.2) and runs the linter with the command golangci-lint run, which checks for various code quality issues and potential bugs in the Go code.
          uses: golangci/golangci-lint-action@v6
          with:
            version: v1.56.2
            run: golangci-lint run
            working-directory: src/product-catalog
    docker:     #This job builds and pushes a Docker image for the product catalog service. It runs on the latest version of Ubuntu and depends on both the build and code-quality jobs to ensure that the code is built and passes linting checks before creating the Docker image.
        runs-on: ubuntu-latest
        needs: build
        steps:
        - name: checkout code
          uses: actions/checkout@v4
      
        - name: Install docker buildx #This step uses the docker/setup-buildx-action to set up Docker Buildx, which is a tool that allows for building multi-platform Docker images and provides advanced features for building and pushing images to registries. This setup is necessary for the subsequent steps that involve building and pushing the Docker image for the product catalog service.
          uses: docker/setup-buildx-action@v2

        - name: Login to DockerHub
          uses: docker/login-action@v3
          with:
            username: ${{ secrets.DOCKER_USERNAME }}
            password: ${{ secrets.DOCKER_TOKEN }}

        - name: Push to DockerHub #This step uses the docker/build-push-action to build a Docker image from the Dockerfile located in the src/product-catalog directory and pushes it to DockerHub. 
          uses: docker/build-push-action@v6
          with:
            context: src/product-catalog
            file: src/product-catalog/Dockerfile
            push: true
            tags: ${{ secrets.DOCKER_USERNAME }}/product-catalog:${{ github.run_id }}

    update-k8s-manifest:
        runs-on: ubuntu-latest
        needs: docker
        steps:
        - name: checkout code
          uses: actions/checkout@v4
          with:
            ref: main
            fetch-depth: 0
            token: ${{ secrets.TOKEN }}

        - name: Update k8s manifest with new image tag
          run: |
               sed -i "s|image: .*|image: ${{ secrets.DOCKER_USERNAME }}/product-catalog:${{ github.run_id }}|g" kubernetes/productcatalog/deploy.yaml

        - name: Commit and push changes
          run: |
            git config --global user.name "sutarakash2411"
            git config --global user.email "sutarakash2411@gmail.com"
            git add kubernetes/productcatalog/deploy.yaml
            git commit -m "[CI] Update product catalog image tag to ${{ github.run_id }}"
            git push origin HEAD:main